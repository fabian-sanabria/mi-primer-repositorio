name: Stats

on:
  push:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Javascript
        uses: actions/setup-node@v6
        with:
          node-version: "v22.22.3"

      - name: Run script
        run: node home/home.js

      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Update stats
          commit_user_name: dahiana [GitHub Actions]
          commit_user_email: fabian_1903@hotmail.com
          commit_author: fabian <fabian_1903@hotmail.com>
